<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Wiki Search AI</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="search-wikipedia.css"
  />

</head>

<body>

  <!-- Background Glow -->
  <div class="bg-glow"></div>

  <main class="main-container">

    <!-- HERO SECTION -->
    <section class="hero-section">

      <div class="hero-card">

        <img
          class="wiki-logo"
          src="https://d1tgh8fmlzexmh.cloudfront.net/ccbp-dynamic-webapps/wiki-logo-img.png"
          alt="Wikipedia Logo"
        />

        <h1>
          Wikipedia Smart Search
        </h1>

        <p>
          Search Wikipedia articles instantly with live results.
        </p>

        <!-- Search Box -->
        <div class="search-box">

          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"
            />

          </svg>

          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search Wikipedia..."
          />

        </div>

      </div>

    </section>

    <!-- SPINNER -->
    <div class="d-none" id="spinner">

      <div class="spinner-wrapper">

        <div
          class="spinner-border text-light"
          role="status"
        >
          <span class="sr-only">
            Loading...
          </span>
        </div>

      </div>

    </div>

    <!-- SEARCH RESULTS -->
    <section
      class="search-results"
      id="searchResults"
    >

      <!-- Empty State -->
      <div class="empty-state">

        <div class="empty-icon">
          🔎
        </div>

        <h2>
          Search Anything
        </h2>

        <p>
          Start typing to explore Wikipedia articles.
        </p>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="search-wikipedia.js"></script>

</body>

</html>
